<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Professional portfolio of a creative developer specializing in 3D web experiences, modern React applications, and cutting-edge web technologies. Explore my projects featuring Three.js, WebGL, and innovative designs." />
  <meta name="keywords"
    content="web developer, 3D developer, Three.js, React, portfolio, creative developer, WebGL, frontend developer, full stack developer, UI/UX designer" />
  <meta name="author" content="Your Name" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="theme-color" content="#0a0a0f" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://yourportfolio.com/" />
  <meta property="og:title" content="Your Name - Creative Developer & 3D Enthusiast" />
  <meta property="og:description"
    content="Crafting beautiful digital experiences with code, design, and 3D magic. View my portfolio of innovative web projects." />
  <meta property="og:image" content="https://yourportfolio.com/og-image.jpg" />
  <meta property="og:site_name" content="Your Name Portfolio" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://yourportfolio.com/" />
  <meta name="twitter:title" content="Your Name - Creative Developer & 3D Enthusiast" />
  <meta name="twitter:description" content="Crafting beautiful digital experiences with code, design, and 3D magic." />
  <meta name="twitter:image" content="https://yourportfolio.com/twitter-image.jpg" />
  <meta name="twitter:creator" content="@yourusername" />

  <!-- Structured Data - JSON-LD -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Your Name",
      "jobTitle": "Creative Developer & 3D Enthusiast",
      "url": "https://yourportfolio.com",
      "sameAs": [
        "https://github.com/yourusername",
        "https://linkedin.com/in/yourusername",
        "https://twitter.com/yourusername"
      ],
      "knowsAbout": ["Web Development", "3D Graphics", "React", "Three.js", "JavaScript", "UI/UX Design"]
    }
    </script>

  <title>Professional 3D Portfolio</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
